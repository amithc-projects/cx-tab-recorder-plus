<!DOCTYPE html>
<html>
<head>
  <title>Video Merger Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      padding: 32px 16px;
      background: #111827;
      color: #F9FAFB;
      margin: 0;
      min-height: 100vh;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
      background: #1F2937;
      padding: 28px 28px 32px;
      border-radius: 12px;
      border: 1px solid #374151;
    }

    /* Header */
    .page-header {
      display: flex; align-items: center; gap: 10px;
      justify-content: center; margin-bottom: 6px;
    }
    h1 {
      font-size: 18px; font-weight: 700; margin: 0;
      color: #F9FAFB; letter-spacing: -0.2px;
    }
    .subtitle {
      text-align: center; color: #6B7280;
      font-size: 12px; margin: 0 0 28px;
    }

    /* Section label */
    .section-title {
      font-size: 10px; font-weight: 700; color: #6B7280;
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 10px;
    }

    /* Input groups */
    .input-group {
      margin-bottom: 16px; padding: 16px;
      border: 1px solid #374151; border-radius: 8px;
      background: #111827;
    }
    .input-group label {
      display: block; font-size: 13px; font-weight: 600;
      color: #F9FAFB; margin-bottom: 10px;
    }
    input[type="file"] {
      display: block; width: 100%;
      font-size: 12px; color: #9CA3AF;
      background: #1F2937; border: 1px solid #374151;
      border-radius: 6px; padding: 8px 10px;
      cursor: pointer;
    }
    input[type="file"]::file-selector-button {
      background: #374151; color: #F9FAFB;
      border: none; border-radius: 4px;
      padding: 4px 10px; font-size: 11px;
      font-family: 'Inter', sans-serif;
      cursor: pointer; margin-right: 10px;
    }
    input[type="file"]::file-selector-button:hover { background: #4B5563; }

    .text-input {
      width: 100%; padding: 8px 10px; margin-top: 10px;
      background: #1F2937; color: #F9FAFB;
      border: 1px solid #374151; border-radius: 6px;
      font-size: 13px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .text-input:focus { border-color: #3B82F6; }
    .text-input::placeholder { color: #4B5563; }

    .hint { font-size: 11px; color: #6B7280; margin-top: 6px; }

    /* Layout controls */
    .layout-row { display: flex; gap: 12px; margin-bottom: 20px; }
    .layout-field { flex: 1; }
    .field-mini-label { font-size: 11px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .styled-select-full {
      width: 100%; padding: 8px 10px;
      background: #111827; color: #F9FAFB;
      border: 1px solid #374151; border-radius: 6px;
      font-size: 13px; font-family: 'Inter', sans-serif;
      outline: none; cursor: pointer;
    }
    .styled-select-full:focus { border-color: #3B82F6; }
    .video-role { font-size: 11px; font-weight: 600; color: #3B82F6; margin-left: 6px; }

    /* Primary action button */
    button#processBtn {
      background: #2563EB; color: white; border: none;
      padding: 12px 24px; font-size: 14px; font-weight: 600;
      font-family: 'Inter', sans-serif;
      border-radius: 8px; cursor: pointer;
      display: block; width: 100%; margin-top: 24px;
      transition: background 0.2s;
    }
    button#processBtn:disabled { background: #374151; color: #6B7280; cursor: not-allowed; }
    button#processBtn:hover:not(:disabled) { background: #1D4ED8; }

    /* Status */
    #status {
      margin-top: 16px; text-align: center;
      font-size: 13px; font-weight: 600; min-height: 20px;
      color: #9CA3AF;
    }

    /* Progress */
    #progressContainer { display: none; margin-top: 20px; }
    progress {
      width: 100%; height: 8px;
      border-radius: 4px; border: none;
      appearance: none; -webkit-appearance: none;
      background: #374151; display: block;
    }
    progress::-webkit-progress-bar { background: #374151; border-radius: 4px; }
    progress::-webkit-progress-value { background: #3B82F6; border-radius: 4px; transition: width 0.2s; }
    progress::-moz-progress-bar { background: #3B82F6; border-radius: 4px; }

    .time-labels {
      display: flex; justify-content: space-between;
      font-size: 11px; color: #6B7280;
      margin-top: 6px; font-family: monospace;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="page-header">
   <img src="icons/icon128.png" width="20" height="20" style="display:block;">
      <h1>OmniCapt Merger Studio</h1>
    </div>
    <p class="subtitle">Merge two recordings into a single comparison video.</p>

    <div class="section-title">Layout</div>

    <div class="layout-row">
      <div class="layout-field">
        <div class="field-mini-label">Template</div>
        <select id="templateSelect" class="styled-select-full">
          <optgroup label="2 Videos">
            <option value="side-by-side">Side by Side</option>
            <option value="top-bottom">Top / Bottom</option>
            <option value="pip">Picture in Picture</option>
          </optgroup>
          <optgroup label="3 Videos">
            <option value="3-columns">3 Columns</option>
            <option value="1-over-2">1 over 2</option>
          </optgroup>
          <optgroup label="4 Videos">
            <option value="2x2-grid">2×2 Grid</option>
            <option value="4-columns">4 Columns</option>
          </optgroup>
        </select>
      </div>
      <div class="layout-field" id="gapField">
        <div class="field-mini-label">Gap</div>
        <select id="gapSelect" class="styled-select-full">
          <option value="0">None</option>
          <option value="8">Small (8px)</option>
          <option value="16" selected>Medium (16px)</option>
          <option value="32">Large (32px)</option>
        </select>
      </div>
    </div>

    <div class="section-title">Video Sources</div>

    <div id="videoSourcesContainer"></div>

    <button id="processBtn" disabled>Start Merge & Download</button>

    <div id="progressContainer">
      <progress id="progressBar" value="0" max="100"></progress>
      <div class="time-labels">
        <span id="currentTimeText">00:00</span>
        <span id="totalTimeText">00:00</span>
      </div>
    </div>

    <div id="status"></div>

    <video id="vid1" playsinline style="display:none;" muted></video>
    <video id="vid2" playsinline style="display:none;" muted></video>
    <video id="vid3" playsinline style="display:none;" muted></video>
    <video id="vid4" playsinline style="display:none;" muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
  </div>

  <script src="merger.js"></script>
</body>
</html>
